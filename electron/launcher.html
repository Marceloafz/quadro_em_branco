<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Quadro Branco</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 14px;
      padding: 16px;
      user-select: none;
      -webkit-app-region: drag;
    }

    h1 { font-size: 15px; font-weight: 600; color: #111; }

    .opcoes {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 220px;
      -webkit-app-region: no-drag;
    }

    .opcao { display: flex; flex-direction: column; gap: 4px; }

    .divisor {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d1d5db;
      font-size: 11px;
    }
    .divisor::before, .divisor::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    /* ── lista de hosts ── */
    .hosts-wrapper {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hosts-lista {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      overflow-y: auto;
      max-height: 110px;
      min-height: 52px;
    }

    .host-vazio {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      font-size: 11px;
      color: #9ca3af;
      gap: 6px;
    }

    .host-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-bottom: 1px solid #f3f4f6;
      cursor: default;
    }
    .host-item:last-child { border-bottom: none; }
    .host-item:hover { background: #f0f9ff; }

    .host-ip {
      font-size: 12px;
      font-weight: 600;
      color: #1e40af;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .host-ip::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .btn-entrar {
      padding: 4px 10px;
      border: 1px solid #2563eb;
      border-radius: 6px;
      background: #fff;
      color: #2563eb;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-entrar:hover { background: #2563eb; color: #fff; }

    /* ── ip manual ── */
    .ip-row { display: flex; gap: 6px; }

    input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 12px;
      color: #374151;
      background: #fff;
      outline: none;
    }
    input[type="text"]:focus { border-color: #2563eb; }
    input[type="text"]::placeholder { color: #9ca3af; }
    input[type="text"]:disabled { opacity: .45; }

    button {
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover:not(:disabled) { opacity: .85; }
    button:disabled { opacity: .45; cursor: default; }

    .btn-host     { background: #2563eb; color: #fff; width: 100%; padding: 10px; }
    .btn-conectar { background: #fff; color: #2563eb; border: 1px solid #2563eb; font-size: 12px; white-space: nowrap; }

    .desc { font-size: 11px; color: #9ca3af; padding-left: 2px; }

    #status {
      font-size: 12px;
      color: #6b7280;
      min-height: 14px;
      -webkit-app-region: no-drag;
    }
    #status.erro { color: #ef4444; }

    .ip-info { font-size: 11px; color: #9ca3af; }
    .ip-info span {
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      user-select: text;
    }
    .ip-info span:hover { color: #2563eb; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    .buscando { animation: pulse 1.5s infinite; }
  </style>
</head>
<body>

  <h1>🖊 Quadro Branco Colaborativo</h1>

  <div class="opcoes">

    <div class="opcao">
      <button class="btn-host" id="btn-host">Hospedar sessão</button>
      <span class="desc">Inicia o servidor nesta máquina</span>
    </div>

    <div class="divisor">sessões na rede</div>

    <div class="hosts-wrapper">
      <div class="hosts-lista" id="hosts-lista">
        <div class="host-vazio">
          <span class="buscando">⬤</span> buscando...
        </div>
      </div>
      <span class="desc">Clique em Entrar para conectar</span>
    </div>

    <div class="divisor">ou informe o IP</div>

    <div class="opcao">
      <div class="ip-row">
        <input type="text" id="input-ip" placeholder="100.x.x.x ou 192.168.x.x" />
        <button class="btn-conectar" id="btn-conectar">Conectar</button>
      </div>
      <span class="desc">Útil para Tailscale ou IP manual</span>
    </div>

    <p class="ip-info">Seu IP: <span id="meu-ip">carregando...</span></p>
  </div>

  <p id="status"></p>

  <script>
    const btnHost     = document.getElementById('btn-host');
    const btnConectar = document.getElementById('btn-conectar');
    const inputIp     = document.getElementById('input-ip');
    const statusEl    = document.getElementById('status');
    const hostsLista  = document.getElementById('hosts-lista');

    function desabilitar() {
      btnHost.disabled     = true;
      btnConectar.disabled = true;
      inputIp.disabled     = true;
      hostsLista.querySelectorAll('.btn-entrar').forEach(b => b.disabled = true);
    }

    btnHost.addEventListener('click', () => {
      desabilitar();
      window.electronAPI.hospedar();
    });

    btnConectar.addEventListener('click', () => {
      const ip = inputIp.value.trim();
      if (!ip) { inputIp.focus(); return; }
      desabilitar();
      window.electronAPI.conectarIp(ip);
    });

    inputIp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnConectar.click();
    });

    window.electronAPI.onHostsLista((lista) => {
      if (lista.length === 0) {
        hostsLista.innerHTML = `
          <div class="host-vazio">
            <span class="buscando">⬤</span> buscando...
          </div>`;
        return;
      }

      hostsLista.innerHTML = lista.map(({ ip, port }) => `
        <div class="host-item">
          <span class="host-ip">${ip}</span>
          <button class="btn-entrar" data-ip="${ip}" data-port="${port}">Entrar</button>
        </div>
      `).join('');

      hostsLista.querySelectorAll('.btn-entrar').forEach(btn => {
        btn.addEventListener('click', () => {
          desabilitar();
          window.electronAPI.entrarHost(btn.dataset.ip, Number(btn.dataset.port));
        });
      });
    });

    window.electronAPI.getIp().then((ip) => {
      const el = document.getElementById('meu-ip');
      el.textContent = ip;
      el.title = 'Clique para copiar';
      el.addEventListener('click', () => {
        navigator.clipboard.writeText(ip);
        el.textContent = 'copiado!';
        setTimeout(() => { el.textContent = ip; }, 1500);
      });
    });

    window.electronAPI.onStatus((msg, tipo) => {
      statusEl.textContent = msg;
      statusEl.className   = tipo === 'erro' ? 'erro' : '';
    });
  </script>
</body>
</html>
