<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quadro Branco Colaborativo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: sans-serif;
      background: #f5f5f5;
      overflow: hidden;
    }

    header {
      height: 48px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      flex-shrink: 0;
    }

    header h1 { font-size: 15px; font-weight: 600; color: #333; }

    /* -- barra de ferramentas -- */
    #toolbar {
      height: 48px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .swatch {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .swatch.selecionado { border-color: #333; }

    #espessura-slider { width: 80px; }

    #espessura-preview {
      border-radius: 50%;
      background: #1a1a1a;
      transition: width .15s, height .15s, background .15s;
    }

    #cor-custom { width: 28px; height: 28px; border: none; cursor: pointer; background: none; }

    .btn-tool {
      padding: 4px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-tool:hover { background: #f3f4f6; }
    .btn-tool.ativo { background: #eff6ff; border-color: #3b82f6; color: #2563eb; }

    #btn-limpar { margin-left: auto; }
    #btn-limpar:hover { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }

    /* -- status -- */
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      flex-shrink: 0;
    }
    #status-dot.online   { background: #22c55e; }
    #status-dot.offline  { background: #ef4444; }

    #status-txt { font-size: 12px; color: #888; margin-left: auto; }

    /* -- canvas -- */
    #palco { position: relative; flex: 1; overflow: hidden; }

    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #ffffff;
      cursor: crosshair;
    }

    /* -- painel de usuarios online -- */
    #painel-usuarios {
      position: absolute;
      left: 12px;
      bottom: 12px;
      min-width: 150px;
      max-height: 40%;
      overflow-y: auto;
      background: rgba(255, 255, 255, .95);
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .08);
      padding: 10px 12px;
      font-size: 13px;
    }
    #painel-usuarios h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    #listaUsuarios > div {
      display: flex;
      align-items: center;
      padding: 2px 0;
      color: #374151;
    }

    /* -- notificacoes -- */
    .notificacao {
      position: absolute;
      right: 16px;
      top: 16px;
      background: #111827;
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .2);
      opacity: 0;
      transform: translateY(-6px);
      animation: surge .25s forwards;
      z-index: 10;
    }
    @keyframes surge { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <header>
    <h1>Quadro Branco Colaborativo</h1>
    <div id="status-dot" class="offline"></div>
    <span id="status-txt">desconectado</span>
  </header>

  <div id="toolbar">
    <!-- paleta rapida -->
    <span class="swatch selecionado" data-cor="#1a1a1a" style="background:#1a1a1a"></span>
    <span class="swatch" data-cor="#ef4444" style="background:#ef4444"></span>
    <span class="swatch" data-cor="#3b82f6" style="background:#3b82f6"></span>
    <span class="swatch" data-cor="#22c55e" style="background:#22c55e"></span>
    <span class="swatch" data-cor="#f59e0b" style="background:#f59e0b"></span>
    <span class="swatch" data-cor="#a855f7" style="background:#a855f7"></span>
    <span class="swatch" data-cor="#ffffff" style="background:#fff; border:1px solid #ccc"></span>

    <!-- cor personalizada -->
    <input type="color" id="cor-custom" title="Cor personalizada" value="#1a1a1a" />

    <!-- espessura -->
    <input type="range" id="espessura-slider" min="1" max="30" value="4" />
    <span id="espessura-preview" style="width:8px;height:8px;"></span>

    <button id="btn-borracha" class="btn-tool" title="Borracha (B)">Borracha</button>
    <button id="btn-salvar" class="btn-tool" title="Salvar como PNG (Ctrl+S)">Salvar PNG</button>
    <button id="btn-limpar" class="btn-tool">Limpar</button>
  </div>

  <div id="palco">
    <canvas id="canvas"></canvas>

    <aside id="painel-usuarios">
      <h2>Online</h2>
      <div id="listaUsuarios"></div>
    </aside>
  </div>

  <!--
    Ordem de carregamento:
      1. socket.io  - biblioteca cliente
      2. socket.js  - sincronizacao em tempo real (Thiago)
      3. canvas.js  - interface de desenho local (Marcelo / Leonardo)

    canvas.js DEVE vir depois de socket.js porque ele define
    window.desenharTraco, window.limparCanvas e window.removerCursor,
    que sao chamados pelos eventos socket registrados em socket.js.
  -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="socket.js"></script>
  <script src="canvas.js"></script>

</body>
</html>
